name: Authoring fast check

on:
  push:
    branches: [main]
    paths-ignore:
      - "evidence/**"
      - "delivery/**"
  pull_request:
    paths-ignore:
      - "evidence/**"
      - "delivery/**"

permissions:
  contents: read

jobs:
  validate-authoring-workspace:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Verify repository health
        run: make doctor

      - name: Verify generated Skill projections are committed
        run: |
          python3 scripts/sync_skills.py --check
          git diff --exit-code -- .agents/skills .claude/skills
