protocol_version: tb-hard-calibration-v1
last_reviewed: 2026-06-24
harbor:
  minimum_version: 0.15.0
  task_schema_version: "1.3"
execution:
  environment_provider: docker
  concurrency: 1
  network_policy: inherit-task
  default_timeout_minutes: 120
trials:
  default_per_agent_model: 3
  aggregate: mean_over_trials
required_run_metadata:
  - task_revision
  - harbor_version
  - agent
  - agent_version
  - model
  - model_configuration
  - command
  - timeout_sec
  - network_policy
  - start_time
  - end_time
  - wall_clock_sec
  - reward
  - job_or_trial_reference
  - artifact_log_location
required_analysis:
  - pass_rate
  - runtime_distribution
  - timeout_rate
  - trajectory_depth_observation
  - failure_taxonomy
  - difficulty_dimension_evidence
  - calibration_decision
acceptance_guidance:
  target_pass_rate_range: [0.30, 0.60]
  minimum_trials_before_decision: 3
  notes: >-
    Pass rate is a target for selected frontier agents under the agreed protocol,
    not a standalone quality decision. Reject ambiguity, flakiness, leakage,
    and infrastructure failure as evidence of difficulty.
